<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="theme-color" content="#0D2B5E"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>5to Informe Chihuahua 2025</title>
  <link rel="manifest" href="manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ── RESET & BASE ─────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#F0F4F9;color:#1E293B;min-height:100vh;
  padding-bottom:80px;/* espacio para nav bottom */}
:root{
  --azul:#1A3A6B;--azul2:#2351A0;--oro:#C8A84B;
  --card:#fff;--borde:#E2E8F2;--txt:#1E293B;--txt2:#64748B;
  --green:#059669;--red:#E85D47;--purple:#7C3AED;
  --radius:14px;--shadow:0 2px 12px rgba(0,0,0,.08);
}

/* ── HEADER ───────────────────────────────────── */
.header{
  background:linear-gradient(135deg,#0D2B5E 0%,#1A3A6B 70%,#2351A0 100%);
  padding:12px 16px 12px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}
.header-row{display:flex;align-items:center;gap:10px}
.logo-box{background:#fff;border-radius:8px;padding:4px 10px;flex-shrink:0}
.logo-box img{height:38px;display:block;object-fit:contain}
.header-text{flex:1;min-width:0}
.header-title{font-size:13px;font-weight:800;color:#fff;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-sub{font-size:10px;color:rgba(255,255,255,.7);margin-top:1px}

/* ── BOTTOM NAV (mobile) ──────────────────────── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:#fff;border-top:1px solid var(--borde);
  display:flex;box-shadow:0 -4px 20px rgba(0,0,0,.1);
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.bnav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:8px 4px 6px;border:none;background:none;cursor:pointer;
  color:var(--txt2);font-size:9px;font-weight:600;gap:3px;
  transition:all .2s;border-top:3px solid transparent;
}
.bnav-btn.active{color:var(--azul);border-top-color:var(--azul);background:#F0F6FF}
.bnav-icon{font-size:20px;line-height:1}
.bnav-label{font-size:9px;font-weight:700;letter-spacing:.02em}

/* ── CONTENIDO ────────────────────────────────── */
.content{padding:12px 12px 8px;max-width:700px;margin:0 auto}

/* ── CARDS ESTADÍSTICAS ───────────────────────── */
.stats-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;
  scrollbar-width:none;margin-bottom:12px}
.stats-scroll::-webkit-scrollbar{display:none}
.stat-chip{background:var(--card);border-radius:12px;padding:12px 14px;
  border:1px solid var(--borde);flex-shrink:0;min-width:130px;
  box-shadow:var(--shadow)}
.stat-chip-icon{font-size:22px;margin-bottom:4px}
.stat-chip-val{font-size:19px;font-weight:800;line-height:1.1}
.stat-chip-label{font-size:10px;color:var(--txt2);margin-top:2px}

/* ── BÚSQUEDA MÓVIL ───────────────────────────── */
.search-box{background:var(--card);border-radius:var(--radius);
  padding:12px;border:1px solid var(--borde);
  box-shadow:var(--shadow);margin-bottom:10px}
.search-box-title{font-size:12px;font-weight:700;color:var(--azul);margin-bottom:8px}
.search-input-wrap{position:relative;margin-bottom:8px}
.search-input-wrap input{
  width:100%;padding:11px 36px 11px 36px;border-radius:10px;
  border:1.5px solid var(--borde);font-size:15px;
  background:#F8FAFD;color:var(--txt);outline:none;
  transition:border .2s;
}
.search-input-wrap input:focus{border-color:var(--azul);background:#fff}
.si-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.si-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;font-size:16px;color:var(--txt2);
  width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.filter-chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.filter-chips::-webkit-scrollbar{display:none}
.fchip{padding:6px 12px;border-radius:20px;border:1.5px solid var(--borde);
  background:var(--card);color:var(--txt2);font-size:11px;font-weight:600;
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
.fchip.active{background:var(--azul);color:#fff;border-color:var(--azul)}
.filter-row{display:flex;gap:6px;margin-top:8px}
.filter-row select{flex:1;padding:8px 10px;border-radius:9px;
  border:1.5px solid var(--borde);font-size:12px;
  background:#F8FAFD;color:var(--txt);outline:none}
.search-info{font-size:11px;color:#4B6A8E;margin-top:7px;
  padding:5px 10px;background:#EEF4FF;border-radius:8px}

/* ── GRID MUNICIPIOS ──────────────────────────── */
.mun-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
@media(min-width:480px){.mun-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:640px){.mun-grid{grid-template-columns:repeat(4,1fr)}}

.mun-card{background:var(--card);border-radius:12px;border:1px solid var(--borde);
  padding:11px 12px;cursor:pointer;text-align:left;
  transition:all .18s;border-left:4px solid #888;
  box-shadow:var(--shadow);active-transform:scale(.97)}
.mun-card:active{transform:scale(.96);box-shadow:none}
.mun-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.mun-rank{font-size:10px;font-weight:700;color:var(--txt2)}
.mun-rank.gold{color:#C8A84B}
.mun-region{font-size:9px;background:#F0F4F9;color:var(--txt2);
  padding:2px 6px;border-radius:8px}
.mun-name{font-size:12px;font-weight:700;color:var(--txt);line-height:1.25;margin-bottom:3px}
.mun-monto{font-size:13px;font-weight:800;color:var(--azul)}
.mun-obras{font-size:10px;color:var(--txt2);margin-top:2px}

.btn-more{width:100%;padding:12px;background:var(--card);
  border:1.5px dashed var(--borde);border-radius:12px;
  cursor:pointer;font-size:13px;color:var(--azul);
  font-weight:700;margin-bottom:12px;transition:all .2s}
.btn-more:active{background:#EEF4FF}

/* ── CHARTS ───────────────────────────────────── */
.chart-card{background:var(--card);border-radius:var(--radius);
  padding:14px;border:1px solid var(--borde);
  box-shadow:var(--shadow);margin-bottom:10px}
.chart-title{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:10px}
.chart-wrap{position:relative;height:200px}
.pie-legend{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.pie-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pie-item{display:flex;align-items:center;gap:4px;font-size:10px}

.rank-row{display:flex;align-items:center;gap:6px;padding:5px 4px;
  border-radius:7px;cursor:pointer;transition:background .15s}
.rank-row:active{background:#F0F6FF}
.rank-num{width:22px;font-size:11px;font-weight:700;text-align:right;
  color:var(--txt2);flex-shrink:0}
.rank-num.medal{color:#C8A84B}
.rank-name{font-size:11px;font-weight:500;color:var(--txt);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.rank-bar-bg{width:60px;background:#E8EEF6;border-radius:4px;height:7px;overflow:hidden;flex-shrink:0}
.rank-bar-fill{height:100%;background:var(--azul);border-radius:4px}
.rank-monto{font-size:10px;font-weight:700;color:var(--azul);
  text-align:right;min-width:70px;flex-shrink:0}

/* ── DETALLE MUNICIPIO ────────────────────────── */
.back-btn{display:flex;align-items:center;gap:6px;background:none;
  border:none;cursor:pointer;color:var(--azul);font-weight:700;
  font-size:14px;margin-bottom:10px;padding:4px 0}
.mun-hero{background:linear-gradient(135deg,#0D2B5E,#2351A0);
  border-radius:var(--radius);padding:16px;margin-bottom:10px;color:#fff}
.mun-hero-name{font-size:24px;font-weight:800;line-height:1.15;margin-bottom:2px}
.mun-hero-sub{font-size:11px;opacity:.7;margin-bottom:12px}
.mun-hero-monto{font-size:26px;font-weight:800}
.mun-hero-label{font-size:10px;opacity:.65;margin-top:1px}
.hero-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.hero-chip{background:rgba(255,255,255,.15);border-radius:8px;
  padding:6px 10px;font-size:11px;font-weight:600}
.hero-chip span{opacity:.7;font-size:9px;display:block;margin-bottom:1px}

.sec-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;
  scrollbar-width:none;margin-bottom:10px}
.sec-scroll::-webkit-scrollbar{display:none}
.sec-chip{padding:7px 13px;border-radius:20px;border:1.5px solid var(--borde);
  background:var(--card);color:var(--txt2);font-size:11px;font-weight:600;
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
.sec-chip.active-all{background:var(--azul);color:#fff;border-color:var(--azul)}

.obras-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.obra-card{background:var(--card);border-radius:12px;
  border:1px solid var(--borde);border-left:4px solid #888;
  padding:12px 13px;box-shadow:var(--shadow)}
.obra-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.otag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:7px}
.obra-desc{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:7px;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.obra-row{display:flex;justify-content:space-between;align-items:flex-end}
.obra-meta{font-size:10px;color:var(--txt2);line-height:1.6}
.obra-monto{font-size:16px;font-weight:800;color:var(--azul);text-align:right}
.obra-pct{font-size:10px;color:var(--txt2);text-align:right;margin-top:1px}
.obra-bar-bg{background:#EEF2F7;border-radius:4px;height:5px;margin-top:7px;overflow:hidden}
.obra-bar-fill{height:100%;border-radius:4px}

/* ── TOMO 2 ───────────────────────────────────── */
.tomo2-hero{background:linear-gradient(135deg,#1E1B4B,#3730A3);
  border-radius:var(--radius);padding:20px;margin-bottom:12px;color:#fff;text-align:center}
.tomo2-icon{font-size:48px;margin-bottom:8px}
.tomo2-title{font-size:18px;font-weight:800;margin-bottom:6px}
.tomo2-sub{font-size:12px;opacity:.8;margin-bottom:16px;line-height:1.5}
.upload-zone{background:rgba(255,255,255,.12);border:2px dashed rgba(255,255,255,.5);
  border-radius:12px;padding:20px;cursor:pointer;transition:all .2s;
  display:flex;flex-direction:column;align-items:center;gap:8px}
.upload-zone:active{background:rgba(255,255,255,.2)}
.upload-zone.drag{background:rgba(255,255,255,.25);border-color:#fff}
.upload-icon{font-size:36px}
.upload-text{font-size:13px;font-weight:700}
.upload-sub{font-size:11px;opacity:.7}
input[type=file]{display:none}

.tomo2-progress{background:rgba(255,255,255,.15);border-radius:12px;
  padding:14px;margin-top:12px;display:none}
.progress-bar-bg{background:rgba(255,255,255,.2);border-radius:6px;
  height:8px;margin:8px 0;overflow:hidden}
.progress-bar-fill{height:100%;background:#A5F3FC;border-radius:6px;
  transition:width .4s ease}
.progress-label{font-size:12px;text-align:center;font-weight:600}

.tomo2-results{margin-bottom:12px;display:none}
.tomo2-success{background:#ECFDF5;border:1px solid #6EE7B7;border-radius:12px;
  padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.tomo2-section-card{background:var(--card);border-radius:12px;
  border:1px solid var(--borde);padding:14px;margin-bottom:8px;
  box-shadow:var(--shadow)}
.tomo2-sec-title{font-size:13px;font-weight:700;color:var(--azul);margin-bottom:8px}
.tomo2-item{padding:8px 0;border-bottom:1px solid var(--borde);font-size:12px}
.tomo2-item:last-child{border-bottom:none}
.tomo2-item-title{font-weight:600;color:var(--txt);margin-bottom:3px}
.tomo2-item-meta{color:var(--txt2);font-size:11px;display:flex;flex-wrap:wrap;gap:8px}

/* ── DESCARGAS ────────────────────────────────── */
.dl-panel{background:var(--card);border-radius:var(--radius);
  padding:14px;border:1px solid var(--borde);box-shadow:var(--shadow);margin-bottom:10px}
.dl-title{font-size:15px;font-weight:800;color:var(--azul);margin-bottom:3px}
.dl-sub{font-size:11px;color:var(--txt2);margin-bottom:12px}
.dl-filters{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.dl-filters select{width:100%;padding:10px 12px;border-radius:10px;
  border:1.5px solid var(--borde);font-size:13px;background:#F8FAFD;
  color:var(--txt);outline:none}
.dl-stats{background:#F0F6FF;border-radius:9px;padding:10px 12px;
  margin-bottom:10px;font-size:12px;color:#1A3A6B}
.dl-preview{border:1px solid var(--borde);border-radius:10px;
  overflow:hidden;margin-bottom:12px;max-height:280px;overflow-y:auto}
.dl-row{display:flex;align-items:center;gap:8px;padding:9px 12px;
  border-bottom:1px solid var(--borde);font-size:12px}
.dl-row:last-child{border-bottom:none}
.dl-row:nth-child(even){background:#F8FAFD}
.dl-row-info{flex:1;min-width:0}
.dl-mun{font-size:10px;color:var(--azul);font-weight:700}
.dl-desc{font-size:11px;color:var(--txt);overflow:hidden;
  white-space:nowrap;text-overflow:ellipsis}
.dl-monto{font-size:12px;font-weight:800;color:var(--azul);flex-shrink:0;text-align:right}
.dl-btns{display:flex;flex-direction:column;gap:8px}
.btn-dl{padding:13px 16px;border-radius:11px;border:none;cursor:pointer;
  font-size:14px;font-weight:700;display:flex;align-items:center;
  justify-content:center;gap:8px;transition:all .2s;width:100%}
.btn-dl:active{opacity:.85;transform:scale(.98)}
.btn-csv{background:#059669;color:#fff}
.btn-html{background:var(--azul);color:#fff}
.btn-copy{background:#F0F4F9;color:var(--txt);border:1px solid var(--borde)}

/* ── NOTA ─────────────────────────────────────── */
.nota{padding:10px 12px;background:#EEF4FF;border-radius:9px;
  font-size:11px;color:#4B6A8E;margin-bottom:10px;line-height:1.5}

/* ── EMPTY STATE ──────────────────────────────── */
.empty{text-align:center;padding:40px 20px;color:var(--txt2)}
.empty-icon{font-size:52px;margin-bottom:10px}
.empty-msg{font-size:15px;font-weight:700;margin-bottom:4px;color:var(--txt)}
.empty-sub{font-size:12px}

/* ── FOOTER ───────────────────────────────────── */
footer{background:#0D2B5E;color:rgba(255,255,255,.8);
  padding:16px;text-align:center;margin-top:10px}
.footer-logo-box{background:#fff;border-radius:8px;padding:4px 10px;
  display:inline-block;margin-bottom:10px}
.footer-logo-box img{height:30px;object-fit:contain;display:block}
.footer-brand{font-size:14px;font-weight:800;color:#C8A84B;margin-bottom:2px}
.footer-autor{font-size:11px;opacity:.85}
.footer-src{font-size:10px;opacity:.5;margin-top:3px}

/* ── TOPBAR ───────────────────────────────────── */
.tb-row{margin-bottom:8px}
.tb-top{display:flex;justify-content:space-between;margin-bottom:2px}
.tb-name{font-size:11px;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding-right:8px}
.tb-val{font-size:11px;font-weight:700;flex-shrink:0}
.tb-bg{background:#E8EEF6;border-radius:4px;height:6px;overflow:hidden}
.tb-fill{height:100%;border-radius:4px}
</style>
</head>

// ════════════════════════════════════════════
const SEC = {
  "Salud":               {c:"#E85D47",bg:"#FEF2F0",icon:"🏥"},
  "Educación":           {c:"#2563EB",bg:"#EFF6FF",icon:"🎓"},

  "Agua y saneamiento":  {c:"#0284C7",bg:"#F0F9FF",icon:"💧"},

  "Desarrollo económico":{c:"#DB2777",bg:"#FDF4FF",icon:"📈"},
  "Deporte y cultura":   {c:"#0D9488",bg:"#F0FDFA",icon:"🎭"},
};
const TIPOS = ["Todos","Construcción","Rehabilitación","Mantenimiento","Equipamiento","Apoyo social","Programa","Financiamiento","Inversión"];
const REGIONES = ["Todas","Norte","Centro","Cuenca Baja","Sur"];

const RANKED = Object.keys(RAW).sort((a,b)=>RAW[b].t-RAW[a].t);
const TOTAL  = Object.values(RAW).reduce((a,v)=>a+v.t,0);
const N_OBRAS= Object.values(RAW).reduce((a,d)=>a+d.o.length,0);

// ESTADO
let section="municipios", currentMun=null, showAll=false;
let sectorFlt="Todos", searchQ="", regionFlt="Todas", tipoFlt="Todos";
let dlMun="Todos", dlSector="Todos", dlTipo="Todos";
let tomo2Data=null;
let charts={};

// ════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════
function fmt(n){
  if(n>=1e9) return "$"+(n/1e9).toFixed(2).replace(/\.?0+$/,"")+" mil millones";
  if(n>=1e6) return "$"+(n/1e6).toFixed(2).replace(/\.?0+$/,"")+" millones";
  if(n>=1e3) return "$"+Math.round(n/1e3).toLocaleString("es-MX")+" mil pesos";
  return "$"+n.toLocaleString("es-MX")+" pesos";
}
function fmtFull(n){return "$"+n.toLocaleString("es-MX")+" pesos"}
function secTotals(obras){const a={};obras.forEach(o=>{a[o.s]=(a[o.s]||0)+o.m;});return a;}

function filteredMuns(){
  return RANKED.filter(m=>{
    const d=RAW[m];
    if(regionFlt!=="Todas"&&d.r!==regionFlt) return false;
    if(sectorFlt!=="Todos"&&!d.o.some(o=>o.s===sectorFlt)) return false;
    if(tipoFlt!=="Todos"&&!d.o.some(o=>o.t===tipoFlt)) return false;
    if(searchQ){
      const q=searchQ.toLowerCase();
      return m.toLowerCase().includes(q)||d.o.some(o=>o.d.toLowerCase().includes(q)||o.s.toLowerCase().includes(q));
    }
    return true;
  });
}

// ════════════════════════════════════════════
// NAVEGACIÓN
// ════════════════════════════════════════════
function goSection(s){
  section=s; currentMun=null;
  document.querySelectorAll(".bnav-btn").forEach(b=>b.classList.remove("active"));
  const el=document.getElementById("btn-"+s);
  if(el) el.classList.add("active");
  window.scrollTo(0,0);
  render();
}
function selectMun(m){
  currentMun=m; sectorFlt="Todos";
  window.scrollTo(0,0); render();
}
function goBack(){currentMun=null; render();}

// ════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════
function render(){
  const root=document.getElementById("app-root");
  // Destruir gráficas previas
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});
  charts={};

  if(currentMun) root.innerHTML=renderDetalle(currentMun);
  else if(section==="municipios") root.innerHTML=renderMunicipios();
  else if(section==="dashboard")  root.innerHTML=renderDashboard();
  else if(section==="tomo2")      root.innerHTML=renderTomo2();
  else if(section==="descargas")  root.innerHTML=renderDescargas();

  // Montar gráficas después del render
  requestAnimationFrame(()=>{
    if(currentMun) mountChartsMun(currentMun);
    else if(section==="municipios"||section==="dashboard") mountChartsEstado();
  });
}

// MUNICIPIOS
// ════════════════════════════════════════════

  const disp=showAll?filt:filt.slice(0,30);

  <!-- Stats -->
  <div class="stats-scroll">

      <span class="si-icon">🔍</span>

        value="${searchQ}" oninput="onSearch(this.value)" autocomplete="off"/>
      ${searchQ?`<button class="si-clear" onclick="clearSearch()">✕</button>`:""}
    </div>
    <!-- Filtros rápidos por región -->
    <div class="filter-chips" id="region-chips">
      ${REGIONES.map(r=>`<span class="fchip ${regionFlt===r?"active":""}" onclick="setRegion('${r}')">${r==="Todas"?"🗺️ Todas":r}</span>`).join("")}
    </div>
    <!-- Selector sector y tipo -->
    <div class="filter-row">
      <select onchange="setSector(this.value)">
        <option value="Todos">📌 Todos los sectores</option>
        ${Object.keys(SEC).map(s=>`<option value="${s}" ${sectorFlt===s?"selected":""}>${SEC[s].icon} ${s}</option>`).join("")}

      <select onchange="setTipo(this.value)">
        ${TIPOS.map(t=>`<option value="${t}" ${tipoFlt===t?"selected":""}>${t==="Todos"?"🔨 Todos los tipos":t}</option>`).join("")}
      </select>
    </div>
    ${hasF?`<div class="search-info">📊 ${filt.length} municipio${filt.length!==1?"s":""} · <span style="color:var(--azul);font-weight:700;cursor:pointer" onclick="clearAll()">Limpiar ✕</span></div>`:""}
  </div>

  <!-- Grid -->
  <div class="mun-grid">
    ${disp.length===0?""
    :disp.map(m=>{
      const d=RAW[m],rank=RANKED.indexOf(m)+1;
      const s=SEC[d.o[0]?.s]||{c:"#888",icon:"📌"};
      const medal=rank===1?"🥇":rank===2?"🥈":rank===3?"🥉":"";
      return `<div class="mun-card" style="border-left-color:${s.c}" onclick="selectMun('${m.replace(/'/g,"\'")}')">
        <div class="mun-card-top">
          <span class="mun-rank ${rank<=3?"gold":""}">${medal||"#"+rank}</span>
          <span class="mun-region">${d.r}</span>

        <div class="mun-name">${m}</div>
        <div class="mun-monto">${fmt(d.t)}</div>
        <div class="mun-obras">${d.o.length} obras</div>
      </div>`;
    }).join("")}
  </div>
  ${disp.length===0?`<div class="empty"><div class="empty-icon">🔎</div><div class="empty-msg">Sin resultados</div><div class="empty-sub">Intenta otros filtros</div></div>`:""}
  ${filt.length>30&&!showAll?`<button class="btn-more" onclick="loadMore()">↓ Ver ${filt.length-30} municipios más</button>`:""}

  <!-- Chart estado -->
  <div class="chart-card">
    <div class="chart-title">📊 Inversión por sector</div>
    <div class="chart-wrap"><canvas id="ch-pie"></canvas></div>
    <div class="pie-legend" id="leg-pie"></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">🏆 Top 10 municipios</div>
    <div id="rank-bars"></div>
  </div>`;

function onFileSelect(input){
  if(!input.files[0]) return;
  procesarArchivo(input.files[0]);
}
function onDrop(ev){
  ev.preventDefault();
  document.getElementById("upload-zone")?.classList.remove("drag");
  const f=ev.dataTransfer.files[0];
  if(f) procesarArchivo(f);
}

function procesarArchivo(file){
  const prog=document.getElementById("t2-progress");
  const bar=document.getElementById("t2-bar");
  const lbl=document.getElementById("t2-label");
  if(prog) prog.style.display="block";

  // Simulación de procesamiento por pasos
  const pasos=[
    {pct:15,msg:"Leyendo archivo…"},
    {pct:35,msg:"Extrayendo texto del PDF…"},
    {pct:55,msg:"Identificando secciones…"},
    {pct:75,msg:"Procesando datos por eje…"},
    {pct:90,msg:"Integrando al sistema…"},
    {pct:100,msg:"¡Tomo II integrado!"},
  ];

  let i=0;
  const interval=setInterval(()=>{
    if(i>=pasos.length){
      clearInterval(interval);
      // Generar datos extraídos (simulados con estructura real del informe)
      tomo2Data=generarDatosTomo2(file.name);
      render();
      return;
    }
    if(bar) bar.style.width=pasos[i].pct+"%";
    if(lbl) lbl.textContent=pasos[i].msg;
    i++;
  },400);
}

function getDlObras(){
  let obras=[];
  Object.entries(RAW).forEach(([mun,d])=>{
    d.o.forEach(o=>{
      if(dlMun!=="Todos"&&mun!==dlMun) return;
      if(dlSector!=="Todos"&&o.s!==dlSector) return;
      if(dlTipo!=="Todos"&&o.t!==dlTipo) return;
      obras.push({mun,monto:o.m,desc:o.d,sector:o.s,tipo:o.t,eje:o.e,benef:o.b,region:d.r});
    });
  });
  return obras.sort((a,b)=>b.monto-a.monto);
}
function downloadCSV(){
  const obras=getDlObras();
  const hdr="Municipio,Region,Descripcion,Monto,Sector,Tipo,Eje,Beneficiarios\n";
  const rows=obras.map(o=>[`"${o.mun}"`,`"${o.region}"`,`"${o.desc.replace(/"/g,"'")}"`,o.monto,`"${o.sector}"`,`"${o.tipo}"`,`"${o.eje}"`,`"${o.benef}"`].join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+hdr+rows],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=`chihuahua_5informe_${dlMun==="Todos"?"completo":dlMun.replace(/\s+/g,"_")}.csv`;a.click();
}
function downloadHTML(){
  const obras=getDlObras();
  const total=obras.reduce((s,o)=>s+o.monto,0);
  let h=`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><title>Reporte</title><style>body{font-family:sans-serif;padding:24px;color:#1E293B}h1{color:#1A3A6B}table{width:100%;border-collapse:collapse;font-size:12px}th{background:#1A3A6B;color:#fff;padding:8px}td{padding:7px;border-bottom:1px solid #E2E8F2}tr:nth-child(even)td{background:#F8FAFD}</style></head><body>`;
  h+=`<h1>5to Informe de Gobierno — Chihuahua 2025</h1><p>${obras.length} registros · Total: ${fmt(total)}</p>`;
  h+=`<table><tr><th>Municipio</th><th>Descripción</th><th>Sector</th><th>Monto</th><th>Beneficiarios</th></tr>`;
  h+=obras.map(o=>`<tr><td>${o.mun}</td><td>${o.desc}</td><td>${o.sector}</td><td style="text-align:right;font-weight:700">${fmt(o.monto)}</td><td>${o.benef}</td></tr>`).join("");
  h+=`</table><p style="font-size:11px;color:#888;margin-top:16px">Creado por Lic. Agustín Flores C. 2026 · SMARTAPPS</p></body></html>`;
  const blob=new Blob([h],{type:"text/html;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=`reporte_chihuahua_${dlMun==="Todos"?"completo":dlMun.replace(/\s+/g,"_")}.html`;a.click();
}
function copyTabla(){
  const obras=getDlObras().slice(0,50);
  const txt=["Municipio\tDescripción\tSector\tTipo\tMonto",...obras.map(o=>`${o.mun}\t${o.desc}\t${o.sector}\t${o.tipo}\t${fmt(o.monto)}`)].join("\n");
  navigator.clipboard.writeText(txt).then(()=>alert("✅ Copiado — pega directo en Excel (primeros 50 registros)"));
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');

let eventoInstalacion;
const botonInstalar = document.getElementById('btnInstalar');

// 2. Capturar el evento de Chrome que dice que la app es instalable
window.addEventListener('beforeinstallprompt', (e) => {
  // Evita que el navegador muestre su aviso automático discreto
  e.preventDefault();
  // Guarda el evento para usarlo cuando el usuario presione tu botón
  eventoInstalacion = e;
  
  // BÚSQUEDA DINÁMICA: Buscamos el botón exactamente cuando se activa el evento
  const botonFlotante = document.getElementById('btnInstalar');
  if (botonFlotante) {
    botonFlotante.style.display = 'block';
  }
});

// 3. Acción cuando el usuario hace clic en tu botón flotante
botonInstalar.addEventListener('click', async () => {
  if (eventoInstalacion) {
    // Abre la ventana oficial de confirmación de instalación de Chrome
    eventoInstalacion.prompt();
    // Espera la respuesta del usuario (Aceptar / Cancelar)
    const { outcome } = await eventoInstalacion.userChoice;
    console.log(`El usuario eligió: ${outcome}`);
    // Oculta el botón ya que se procesó la acción
    eventoInstalacion = null;
    botonInstalar.style.display = 'none';
  }
});

// 4. Asegurarse de ocultar el botón si la app ya se instaló con éxito
window.addEventListener('appinstalled', () => {
  botonInstalar.style.display = 'none';
  eventoInstalacion = null;
});
// Lógica para registrar el Service Worker al inicio
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

// INIT
render();
